name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GlazeWM Config Editor ${{ github.ref_name }}"
          releaseBody: |
            ## GlazeWM Config Editor ${{ github.ref_name }}

            ### Installation
            1. Download the `.msi` installer below
            2. Run it on Windows 11 — no other software needed
            3. Launch "GlazeWM Config Editor" from the Start Menu

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
